{% extends "base.html" %}

{% block title %}THE ANTS — Контакты{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>Контакты</h1>
        <p>Свяжитесь с нами — мы будем рады помочь</p>
    </div>
</section>

<section class="contact-content">
    <div class="container">
        <div class="contact-grid">
            <div class="contact-form-wrapper">
                <h2>Напишите нам</h2>
                <form method="POST" action="{{ url_for('contact') }}" class="contact-form">
                    <div class="form-group">
                        <label for="name">Имя</label>
                        <input type="text" id="name" name="name" placeholder="Ваше имя" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Сообщение</label>
                        <textarea id="message" name="message" rows="5" placeholder="Расскажите о вашем проекте..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
            </div>

            <div class="contact-info">
                <h2>Информация</h2>
                <div class="info-item">
                    <h3>Email</h3>
                    <p>info@theants.com</p>
                </div>
                <div class="info-item">
                    <h3>Телефон</h3>
                    <p>+7 (999) 123-45-67</p>
                </div>
                <div class="info-item">
                    <h3>Адрес</h3>
                    <p>Москва, ул. Примерная, д. 1</p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
